<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="The ABC Story Time — a colorful preschool alphabet storybook with read-aloud narration.">
<title>The ABC Story Time</title>
<style>
:root{
  --sky:#8edcff;
  --sun:#ffd45c;
  --coral:#ff8c79;
  --pink:#ef79ad;
  --mint:#72d6b3;
  --purple:#8068df;
  --green:#57b976;
  --paper:#fffdf8;
  --ink:#2f2940;
  --muted:#736b82;
  --shadow:0 20px 55px rgba(56,40,78,.16);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  min-height:100vh;
  color:var(--ink);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 15% 14%,rgba(255,255,255,.86) 0 5%,transparent 6%),
    radial-gradient(circle at 85% 16%,rgba(255,255,255,.7) 0 4%,transparent 5%),
    linear-gradient(145deg,#d9f8ff 0%,#fff3cf 45%,#ffe2ee 100%);
  overflow-x:hidden;
}
button,select,input{font:inherit}
button{touch-action:manipulation}
.app{
  width:min(1040px,calc(100% - 22px));
  margin:0 auto;
  padding:24px 0 48px;
}
.hero{
  text-align:center;
  border-radius:32px;
  padding:28px 20px 24px;
  color:white;
  background:
    radial-gradient(circle at 20% 20%,rgba(255,255,255,.2),transparent 23%),
    linear-gradient(135deg,#3f7bcf,#7762d4,#d65b9a);
  box-shadow:var(--shadow);
  position:relative;
  overflow:hidden;
}
.hero h1{
  margin:0;
  font-size:clamp(2.4rem,7vw,5rem);
  line-height:.95;
  letter-spacing:-.05em;
}
.hero p{
  max-width:680px;
  margin:9px auto 0;
  line-height:1.6;
  color:#f4efff;
}
.hero-icons{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-top:15px;
  font-size:2rem;
}
.hero-icons span{
  width:48px;height:48px;
  display:grid;place-items:center;
  border-radius:16px;
  background:rgba(255,255,255,.14);
  animation:bob 3s ease-in-out infinite;
}
.hero-icons span:nth-child(2){animation-delay:-.5s}
.hero-icons span:nth-child(3){animation-delay:-1s}
.hero-icons span:nth-child(4){animation-delay:-1.5s}
@keyframes bob{50%{transform:translateY(-7px) rotate(2deg)}}

.toolbar{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:9px;
  margin:15px 0;
}
select,button,.pill{
  border-radius:999px;
  padding:10px 14px;
  font-weight:800;
}
select,.pill{
  background:white;
  border:1px solid #ddd8ec;
  color:var(--ink);
}
button{
  border:0;
  cursor:pointer;
  background:linear-gradient(135deg,var(--sun),#ffb047);
  color:#3d2c16;
  box-shadow:0 7px 18px rgba(96,57,23,.14);
  transition:.18s ease;
}
button:hover{transform:translateY(-2px)}
button.secondary{
  background:white;
  color:var(--purple);
  border:1px solid #ddd7ef;
}
button.active{
  background:linear-gradient(135deg,var(--pink),var(--coral));
  color:white;
}
.book{
  background:rgba(255,255,255,.9);
  border:1px solid rgba(255,255,255,.95);
  border-radius:32px;
  box-shadow:var(--shadow);
  padding:18px;
}
.book-card{
  display:grid;
  grid-template-columns:230px 1fr;
  gap:18px;
  align-items:center;
  min-height:410px;
  padding:20px;
  border-radius:26px;
  background:
    radial-gradient(circle at 82% 16%,rgba(255,255,255,.8),transparent 24%),
    linear-gradient(145deg,#fff7d5,#e7f7ff,#f5e7ff);
  position:relative;
  overflow:hidden;
}
.book-card.flip{animation:flip .38s ease}
@keyframes flip{
  0%{transform:perspective(1000px) rotateY(0)}
  45%{transform:perspective(1000px) rotateY(-7deg) scale(.99)}
  100%{transform:none}
}
.letter-panel{
  min-height:280px;
  border-radius:28px;
  display:grid;
  place-items:center;
  align-content:center;
  gap:6px;
  color:white;
  background:linear-gradient(145deg,var(--purple),var(--pink));
  box-shadow:0 16px 30px rgba(68,48,110,.18);
}
.big-letter{
  font-size:clamp(6rem,14vw,10rem);
  line-height:.85;
  font-weight:950;
}
.big-emoji{font-size:4rem}
.story-side{
  text-align:center;
}
.story-side h2{
  margin:0 0 10px;
  font-size:clamp(1.5rem,4vw,2.2rem);
  color:var(--purple);
}
.story-text{
  min-height:150px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  border-radius:22px;
  background:white;
  font-size:clamp(1.15rem,2.7vw,1.5rem);
  line-height:1.7;
  box-shadow:0 8px 18px rgba(56,40,78,.08);
}
.page-indicator{
  margin-top:12px;
  font-size:.9rem;
  color:var(--muted);
}
.progress{
  height:11px;
  margin-top:10px;
  background:#e9e3f0;
  border-radius:999px;
  overflow:hidden;
}
.progress > div{
  height:100%;
  width:0;
  background:linear-gradient(90deg,var(--pink),var(--sun),var(--mint));
  transition:width .3s ease;
}
.controls{
  margin-top:16px;
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}
.controls button{min-width:130px}
.volume-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-top:14px;
  color:var(--muted);
}
.letter-strip{
  display:flex;
  gap:6px;
  overflow-x:auto;
  padding:12px 2px 2px;
  scrollbar-width:thin;
}
.letter-btn{
  flex:0 0 auto;
  width:42px;height:42px;
  padding:0;
  border-radius:50%;
  background:white;
  color:var(--purple);
  border:1px solid #e1dbef;
  box-shadow:none;
}
.letter-btn.active{
  background:linear-gradient(135deg,var(--purple),var(--pink));
  color:white;
}
.reward{
  position:fixed;
  z-index:20;
  pointer-events:none;
  font-size:28px;
  animation:reward 1.1s ease-out forwards;
}
@keyframes reward{
  to{opacity:0;transform:translateY(-100px) rotate(35deg) scale(1.35)}
}
.footer{
  text-align:center;
  color:var(--muted);
  font-size:.84rem;
  margin-top:15px;
}
  .site-footer {
  margin-top: 16px;
  padding: 15px 12px;
  text-align: center;
  border-radius: 18px;
  background: rgba(255,255,255,.78);
  border: 1px solid rgba(90,60,120,.12);
  color: #665b72;
  font-size: .84rem;
  line-height: 1.5;
}

.site-footer strong {
  color: #503a76;
}
@media(max-width:760px){
  .book-card{grid-template-columns:1fr}
  .letter-panel{min-height:180px}
  .story-text{min-height:130px}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:.001ms!important;
    animation-iteration-count:1!important;
    scroll-behavior:auto!important;
  }
}
</style>
</head>
<body>
<main class="app">
  <header class="hero">
    <h1>The ABC Story Time</h1>
    <p>Turn the pages, meet friendly characters, and hear a tiny story for every letter from A to Z.</p>
    <div class="hero-icons" aria-hidden="true">
      <span>🍎</span><span>🎈</span><span>🐱</span><span>🌈</span>
    </div>
  </header>

  <div class="toolbar">
    <select id="storySelect" aria-label="Choose a letter story"></select>
    <button id="autoReadBtn" class="secondary">🎵 Auto Read Off</button>
    <button id="themeBtn" class="secondary">🎨 Change Colors</button>
  </div>

  <section class="book">
    <div class="book-card" id="bookCard">
      <div class="letter-panel">
        <div class="big-emoji" id="emoji"></div>
        <div class="big-letter" id="letter"></div>
      </div>

      <div class="story-side">
        <h2 id="storyTitle"></h2>
        <div class="story-text" id="pageText"></div>
        <div class="page-indicator" id="pageIndicator"></div>
        <div class="progress"><div id="progressBar"></div></div>

        <div class="controls">
          <button id="prevBtn" class="secondary">⬅ Back</button>
          <button id="readBtn">🔊 Read Aloud</button>
          <button id="nextBtn">Next ➡</button>
        </div>

        <div class="volume-row">
          <label for="volume">Volume</label>
          <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
        </div>
      </div>
    </div>

    <div class="letter-strip" id="letterStrip" aria-label="Alphabet story navigation"></div>
  </section>

  <p class="footer">Khaemenes Academy • Local-only preschool storytime • No tracking or outside services</p>
</main>

  <footer class="site-footer">
  <strong>© 2026 Verve N Veda · Khaemenes Academy · Jennifer Kay Pearl</strong><br>
  All Rights Reserved.
</footer>

<script>
(() => {
  "use strict";

  const STORIES = {
    A:{emoji:"🐊",title:"A — The Alligator",pages:[
      "A cheerful alligator found a basket of apples beside the river.",
      "He crunched one red apple and one green apple, listening to the crisp snap.",
      "After breakfast, the alligator smiled and said, “A is for apple, and apples are amazing!”"
    ]},
    B:{emoji:"🎈",title:"B — The Balloon",pages:[
      "Bella found a bright blue balloon bouncing beside the bakery.",
      "The balloon bobbed above her while butterflies fluttered nearby.",
      "Bella held the string tightly and whispered, “B is for balloon.”"
    ]},
    C:{emoji:"🐱",title:"C — The Cozy Cat",pages:[
      "Coco the cat curled up on a colorful cushion.",
      "A tiny cricket chirped while Coco watched the clouds.",
      "Coco purred softly and remembered, “C is for cat.”"
    ]},
    D:{emoji:"🦆",title:"D — The Dancing Duck",pages:[
      "Daisy the duck danced beside the pond.",
      "She dipped her beak, drummed her feet, and splashed droplets everywhere.",
      "Daisy quacked happily, “D is for duck.”"
    ]},
    E:{emoji:"🐘",title:"E — The Elephant",pages:[
      "Eli the elephant explored a field of emerald grass.",
      "He lifted his ears and sprayed cool water from his trunk.",
      "Eli trumpeted, “E is for elephant.”"
    ]},
    F:{emoji:"🦋",title:"F — The Fluttering Friend",pages:[
      "A friendly butterfly flew over five flowers.",
      "It fluttered from a fern to a foxglove in the warm breeze.",
      "The butterfly rested and remembered, “F is for fly and flower.”"
    ]},
    G:{emoji:"🌻",title:"G — The Growing Garden",pages:[
      "Gina planted green seeds in her garden.",
      "Gentle rain fell, and golden sunbeams warmed the ground.",
      "Soon the garden grew, and Gina cheered, “G is for garden.”"
    ]},
    H:{emoji:"🐝",title:"H — The Helpful Honeybee",pages:[
      "Hana the honeybee hurried from flower to flower.",
      "She gathered nectar and helped the garden bloom.",
      "Hana buzzed, “H is for honeybee.”"
    ]},
    I:{emoji:"🏠",title:"I — The Icy Igloo",pages:[
      "Iggy built a little igloo from shiny blocks of ice.",
      "Inside, the igloo felt quiet, cozy, and bright.",
      "Iggy smiled and said, “I is for igloo.”"
    ]},
    J:{emoji:"🪼",title:"J — The Jellyfish",pages:[
      "Juno the jellyfish drifted gently through the blue sea.",
      "Her soft tentacles waved like ribbons in the water.",
      "Juno glowed and remembered, “J is for jellyfish.”"
    ]},
    K:{emoji:"🪁",title:"K — The Kite",pages:[
      "Kai carried a colorful kite to the windy hill.",
      "The kite kicked, dipped, and climbed high above the trees.",
      "Kai laughed, “K is for kite.”"
    ]},
    L:{emoji:"🐞",title:"L — The Little Ladybug",pages:[
      "Lulu the ladybug landed on a leaf.",
      "She looked at the light, the lilies, and the long green grass.",
      "Lulu lifted her wings and said, “L is for ladybug.”"
    ]},
    M:{emoji:"🌙",title:"M — The Moon",pages:[
      "Milo watched the moon rise above the mountains.",
      "Moonlight made the meadow shimmer like silver.",
      "Milo whispered, “M is for moon.”"
    ]},
    N:{emoji:"🪺",title:"N — The Nest",pages:[
      "Nina found a neat nest tucked between two branches.",
      "Inside were three tiny eggs, warm and safe.",
      "Nina nodded and said, “N is for nest.”"
    ]},
    O:{emoji:"🌊",title:"O — The Ocean",pages:[
      "Ollie stood beside the open ocean.",
      "He watched orange sunlight sparkle on the rolling waves.",
      "Ollie smiled, “O is for ocean.”"
    ]},
    P:{emoji:"🥞",title:"P — The Pancake",pages:[
      "Penny poured pancake batter into a pan.",
      "The pancake puffed up, and she flipped it with a playful hop.",
      "Penny cheered, “P is for pancake.”"
    ]},
    Q:{emoji:"👑",title:"Q — The Kind Queen",pages:[
      "Queen Quinn wore a quiet, sparkling crown.",
      "She listened carefully to every question in the kingdom.",
      "The queen smiled, “Q is for queen.”"
    ]},
    R:{emoji:"🌈",title:"R — The Rainbow",pages:[
      "Ravi saw a rainbow after the rain.",
      "Red, orange, yellow, green, blue, indigo, and violet curved across the sky.",
      "Ravi whispered, “R is for rainbow.”"
    ]},
    S:{emoji:"⭐",title:"S — The Shining Star",pages:[
      "Sami spotted a small star shining in the night.",
      "The star sparkled above the silent trees.",
      "Sami made a wish and said, “S is for star.”"
    ]},
    T:{emoji:"🐢",title:"T — The Tiny Turtle",pages:[
      "Tara the turtle took tiny steps along the trail.",
      "She carried her round shell wherever she traveled.",
      "Tara smiled, “T is for turtle.”"
    ]},
    U:{emoji:"☂️",title:"U — The Umbrella",pages:[
      "Uma opened her umbrella under a gray cloud.",
      "Raindrops tapped a gentle rhythm above her head.",
      "Uma splashed through a puddle and said, “U is for umbrella.”"
    ]},
    V:{emoji:"🎻",title:"V — The Violin",pages:[
      "Vera placed a violin beneath her chin.",
      "The strings vibrated and filled the room with a warm melody.",
      "Vera bowed and said, “V is for violin.”"
    ]},
    W:{emoji:"🌬️",title:"W — The Wind",pages:[
      "Willow watched the wind wave through the wheat.",
      "It whistled around windows and wiggled the leaves.",
      "Willow laughed, “W is for wind.”"
    ]},
    X:{emoji:"🎶",title:"X — The Xylophone",pages:[
      "Xena tapped the bright bars of her xylophone.",
      "Each color made a clear, cheerful sound.",
      "Xena played a song and said, “X is for xylophone.”"
    ]},
    Y:{emoji:"🥱",title:"Y — The Yawn",pages:[
      "Yara gave a great big yawn at the end of the day.",
      "She stretched her arms and tucked into a yellow blanket.",
      "Yara whispered, “Y is for yawn.”"
    ]},
    Z:{emoji:"🦁",title:"Z — The Zoo",pages:[
      "Zane visited the zoo on a sunny morning.",
      "He saw zebras, lions, parrots, and playful monkeys.",
      "Zane waved and said, “Z is for zoo.”"
    ]}
  };

  const themes=[
    {purple:"#8068df",pink:"#ef79ad",coral:"#ff8c79",sun:"#ffd45c",mint:"#72d6b3"},
    {purple:"#397fa5",pink:"#5ec4d8",coral:"#73c99f",sun:"#f2cf61",mint:"#65d2b2"},
    {purple:"#a34886",pink:"#ef78a8",coral:"#dd7772",sun:"#f0c85c",mint:"#79c89f"},
    {purple:"#4f8a63",pink:"#d16e8f",coral:"#df8a6d",sun:"#efcf68",mint:"#6ec89d"}
  ];

  const state={
    story:localStorage.getItem("abcStoryLetter")||"A",
    page:Number(localStorage.getItem("abcStoryPage")||0),
    autoRead:localStorage.getItem("abcStoryAutoRead")==="true",
    volume:Number(localStorage.getItem("abcStoryVolume")||1),
    theme:Number(localStorage.getItem("abcStoryTheme")||0)
  };

  const $=id=>document.getElementById(id);
  const storySelect=$("storySelect");
  const titleEl=$("storyTitle");
  const textEl=$("pageText");
  const indicatorEl=$("pageIndicator");
  const readBtn=$("readBtn");
  const autoReadBtn=$("autoReadBtn");
  const volumeSlider=$("volume");
  const letterStrip=$("letterStrip");
  const bookCard=$("bookCard");

  function save(){
    localStorage.setItem("abcStoryLetter",state.story);
    localStorage.setItem("abcStoryPage",String(state.page));
    localStorage.setItem("abcStoryAutoRead",String(state.autoRead));
    localStorage.setItem("abcStoryVolume",String(state.volume));
    localStorage.setItem("abcStoryTheme",String(state.theme));
  }

  function applyTheme(){
    const t=themes[state.theme%themes.length];
    for(const [k,v] of Object.entries(t)){
      document.documentElement.style.setProperty("--"+k,v);
    }
  }

  function chooseVoice(){
    if(!("speechSynthesis" in window)) return null;
    const voices=speechSynthesis.getVoices();
    return voices.find(v=>/child|kid|jenny|samantha|aria|female/i.test(v.name)&&/^en/i.test(v.lang))
      || voices.find(v=>/^en/i.test(v.lang))
      || voices[0]
      || null;
  }

  function speak(){
    if(!("speechSynthesis" in window)) return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(STORIES[state.story].pages[state.page]);
    const voice=chooseVoice();
    if(voice) u.voice=voice;
    u.rate=.86;
    u.pitch=1.12;
    u.volume=state.volume;
    speechSynthesis.speak(u);
  }

  function reward(target){
    const r=target.getBoundingClientRect();
    const icons=["⭐","✨","🌈"];
    icons.forEach((icon,i)=>{
      const el=document.createElement("span");
      el.className="reward";
      el.textContent=icon;
      el.style.left=(r.left+r.width/2+(i-1)*26)+"px";
      el.style.top=(r.top+r.height/2)+"px";
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),1200);
    });
  }

  function renderSelectors(){
    storySelect.innerHTML="";
    letterStrip.innerHTML="";
    Object.keys(STORIES).forEach(letter=>{
      const story=STORIES[letter];

      const option=document.createElement("option");
      option.value=letter;
      option.textContent=story.title;
      storySelect.appendChild(option);

      const button=document.createElement("button");
      button.className="letter-btn"+(letter===state.story?" active":"");
      button.textContent=letter;
      button.setAttribute("aria-label","Open story "+letter);
      button.onclick=()=>{
        state.story=letter;
        state.page=0;
        render(true);
      };
      letterStrip.appendChild(button);
    });
    storySelect.value=state.story;
  }

  function render(flip=false){
    const story=STORIES[state.story];
    state.page=Math.max(0,Math.min(state.page,story.pages.length-1));

    if(flip){
      bookCard.classList.remove("flip");
      void bookCard.offsetWidth;
      bookCard.classList.add("flip");
    }

    $("letter").textContent=state.story;
    $("emoji").textContent=story.emoji;
    titleEl.textContent=story.title;
    textEl.textContent=story.pages[state.page];
    indicatorEl.textContent=`Page ${state.page+1} of ${story.pages.length}`;
    $("progressBar").style.width=((state.page+1)/story.pages.length*100)+"%";

    $("prevBtn").disabled=state.page===0;
    $("nextBtn").disabled=state.page===story.pages.length-1;

    autoReadBtn.textContent=state.autoRead?"🎵 Auto Read On":"🎵 Auto Read Off";
    autoReadBtn.classList.toggle("active",state.autoRead);

    renderSelectors();
    save();

    speechSynthesis.cancel();
    if(state.autoRead) setTimeout(speak,220);
  }

  $("nextBtn").onclick=()=>{
    const story=STORIES[state.story];
    if(state.page<story.pages.length-1){
      state.page++;
      reward($("nextBtn"));
      render(true);
    }
  };

  $("prevBtn").onclick=()=>{
    if(state.page>0){
      state.page--;
      render(true);
    }
  };

  readBtn.onclick=()=>{
    speak();
    readBtn.classList.add("active");
    setTimeout(()=>readBtn.classList.remove("active"),600);
  };

  autoReadBtn.onclick=()=>{
    state.autoRead=!state.autoRead;
    render(false);
  };

  storySelect.onchange=e=>{
    state.story=e.target.value;
    state.page=0;
    render(true);
  };

  volumeSlider.value=String(state.volume);
  volumeSlider.oninput=e=>{
    state.volume=Number(e.target.value);
    save();
  };

  $("themeBtn").onclick=()=>{
    state.theme=(state.theme+1)%themes.length;
    applyTheme();
    save();
  };

  document.addEventListener("keydown",e=>{
    if(e.key==="ArrowRight") $("nextBtn").click();
    if(e.key==="ArrowLeft") $("prevBtn").click();
  });

  let startX=0;
  bookCard.addEventListener("pointerdown",e=>startX=e.clientX);
  bookCard.addEventListener("pointerup",e=>{
    const dx=e.clientX-startX;
    if(Math.abs(dx)>55){
      dx<0?$("nextBtn").click():$("prevBtn").click();
    }
  });

  applyTheme();
  render(false);
})();
</script>
</body>
</html>
