<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spire Early Reader Prototype v0.1</title>
<style>
  html, body {
    margin: 3px;
    padding: 7px;
    height: 88%;
    background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
    font-family: "Comic Sans MS", sans-serif;
    overflow: hidden;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 99%;
    text-align: center;
    color: #222;
  }
  h1 {
    font-size: 11rem;
    margin: 0.5em 0;
  }
  .emoji {
    font-size: 222px;
    line-height: 1;
  }
  .word {
    font-size: 3rem;
    color: #333;
  }
  .sentence {
    font-size: 3rem;
    margin-top: 0.5em;
    color: #444;
    max-width: 77%;
  }
  .controls {
    position: absolute;
    bottom: 3%;
    display: flex;
    gap: 2rem;
  }
  button {
    background: #ffdd57;
    border: none;
    font-size: 2rem;
    border-radius: 20px;
    padding: 0.5em 1.5em;
    cursor: pointer;
    box-shadow: 0 5px 0 #f1c232;
    transition: transform 0.2s;
  }
  button:hover {
    transform: scale(1.1);
  }
  button:active {
    box-shadow: 0 2px 0 #f1c232;
    transform: translateY(2px);
  }
</style>
</head>
<body>
<div class="container">
  <h1 id="letter">A</h1>
  <div id="emoji" class="emoji">🍎</div>
  <div id="word" class="word">Apple</div>
  <div id="sentence" class="sentence">A red apple falls from the tree.</div>

  <div class="controls">
    <button onclick="prevLetter()">⬅️ Back</button>
    <button onclick="sayAgain()">🔊 Say It Again</button>
    <button onclick="nextLetter()">Next ➡️</button>
  </div>
</div>

<script>
const alphabet = [
  ["A","Apple","🍎","A red apple falls from the tree."],
  ["B","Blue Ball","🔵","Ben bounces a big blue ball."],
  ["C","Cat","🐱","The cat runs fast in the sun."],
  ["D","Dog","🐶","A dog digs in the soft dirt."],
  ["E","Elephant","🐘","An elephant lifts its long trunk."],
  ["F","Fish","🐟","A fish swims in cool clear water."],
  ["G","Giraffe","🦒","A giraffe eats leaves from tall trees."],
  ["H","Hat","🎩","Holly wears a happy hat."],
  ["I","Ice Cream","🍦","Ice cream melts in the warm sun."],
  ["J","Jaguar","🐆","A jaguar rests under the trees."],
  ["K","Kite","🪁","Kate flies her kite in the blue sky."],
  ["L","Lion","🦁","The lion sleeps in the tall grass."],
  ["M","Moon","🌙","The moon shines over the quiet town."],
  ["N","Nest","🪺","The nest is full of soft feathers."],
  ["O","Orange","🍊","An orange rolls off the table."],
  ["P","Pizza","🍕","Paul shares his pizza with friends."],
  ["Q","Queen","👑","The queen wears a golden crown."],
  ["R","Rainbow","🌈","A rainbow glows after the rain."],
  ["S","Star","⭐","The star twinkles in the night sky."],
  ["T","Turtle","🐢","The turtle moves slowly across the sand."],
  ["U","Umbrella","☂️","An umbrella keeps us dry in the rain."],
  ["V","Violin","🎻","The violin plays a sweet song."],
  ["W","Whale","🐋","A whale splashes in the ocean."],
  ["X","Xylophone","🎼","The xylophone makes fun sounds."],
  ["Y","Yarn","🧶","Yarn rolls across the floor."],
  ["Z","Zebra","🦓","A zebra runs with black and white stripes."]
];

let current = 0;
let speechRate = 0.9;
let readAlong = true;

// --- Emotion-Enhanced Speech ---
function speakWithEmotion(letter, word, sentence) {
  if (!readAlong || !('speechSynthesis' in window)) return;

  const synth = window.speechSynthesis;
  const voices = synth.getVoices();
  const voice = voices.find(v => v.name.includes('Natural') || v.lang.startsWith('en')) || voices[0];

  const intro = new SpeechSynthesisUtterance(`${letter}. is for ${word}.`);
  intro.voice = voice;
  intro.rate = speechRate * 0.90;
  intro.pitch = 1.0;

  const story = new SpeechSynthesisUtterance(sentence);
  story.voice = voice;
  story.rate = speechRate;
  story.pitch = 1.0;

  synth.cancel();
  synth.speak(intro);
  setTimeout(() => synth.speak(story), 1800);
}

// --- Display & Navigation ---
function showLetter(index) {
  const [L, W, emoji, sentence] = alphabet[index];
  document.getElementById("letter").textContent = L;
  document.getElementById("word").textContent = W;
  document.getElementById("emoji").textContent = emoji;
  document.getElementById("sentence").textContent = sentence;
  speakWithEmotion(L, W, sentence);
}

function nextLetter() {
  current = (current + 1) % alphabet.length;
  showLetter(current);
}

function prevLetter() {
  current = (current - 1 + alphabet.length) % alphabet.length;
  showLetter(current);
}

function sayAgain() {
  const [L, W, emoji, sentence] = alphabet[current];
  speakWithEmotion(L, W, sentence);
}

// preload voices and start
window.speechSynthesis.onvoiceschanged = () => showLetter(current);
</script>
</body>
</html>
