<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A is for Alligator – Mini Book</title>

<style>
  body {
    margin: 0;
    background: #f2f7ff;
    font-family: "Comic Sans MS", "Poppins", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  #book {
    width: 90%;
    max-width: 600px;
    height: 420px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    overflow: hidden;
    position: relative;
  }

  .page {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    padding: 25px;
    box-sizing: border-box;
    text-align: center;
    background: #fff;
    transition: transform 0.8s ease, opacity 0.8s ease;
  }

  h1 {
    font-size: 2.7rem;
    color: #2a7f2a;
  }

  p {
    font-size: 1.3rem;
    color: #444;
  }

  img {
    max-width: 80%;
    height: auto;
    margin-top: 15px;
    border-radius: 16px;
  }

  /* Navigation arrows */
  .arrowBtn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: #5ac85a;
    padding: 15px 20px;
    border-radius: 50%;
    font-size: 1.6rem;
    cursor: pointer;
    color: white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    border: none;
    z-index: 10;
  }

  #prevBtn { left: 10px; }
  #nextBtn { right: 10px; }

  .arrowBtn:hover {
    background: #4ab14a;
  }
</style>
</head>

<body>
<div id="book">

  <!-- PAGE 1 -->
  <div class="page" id="page1" style="z-index:3;">
    <h1>A is for Alligator!</h1>
    <p>Meet your new ABC friend.</p>
    <img src="data:image/png;base64,{{ALLIGATOR_HAPPY}}" alt="Alligator Happy" />
  </div>

  <!-- PAGE 2 -->
  <div class="page" id="page2" style="z-index:2; opacity:0;">
    <h1>A is for Apple!</h1>
    <p>Alligators love crunchy apples!</p>
    <img src="data:image/png;base64,{{APPLE_IMAGE}}" alt="Apple" />
  </div>

  <!-- PAGE 3 -->
  <div class="page" id="page3" style="z-index:1; opacity:0;">
    <h1>Alligator Eats ABC!</h1>
    <p>He's learning letters too!</p>
    <img src="data:image/png;base64,{{ALLIGATOR_ABC}}" alt="Alligator eating ABC" />
  </div>

  <button id="prevBtn" class="arrowBtn">⟵</button>
  <button id="nextBtn" class="arrowBtn">⟶</button>
</div>

<script>
let current = 1;

const pages = {
  1: document.getElementById("page1"),
  2: document.getElementById("page2"),
  3: document.getElementById("page3")
};

document.getElementById("nextBtn").onclick = () => flip(1);
document.getElementById("prevBtn").onclick = () => flip(-1);

function flip(dir) {
  let newPage = current + dir;
  if (newPage < 1 || newPage > 3) return;

  pages[current].style.opacity = 0;
  pages[newPage].style.opacity = 1;

  current = newPage;
}
</script>

</body>
</html>
