<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pre-K Piano Deluxe</title>
<style>
  body {
    font-family: "Comic Sans MS", sans-serif;
    text-align: center;
    background: linear-gradient(180deg, #6a5acd, #9370db);
    padding: 20px;
  }

  h1 { 
    font-size: 50px; 
    color: #FFD700; 
    text-shadow: 3px 3px #444; 
    margin-bottom: 10px;
  }
  p { font-size: 20px; color: #fff; }

  .piano {
    display: flex; 
    justify-content: center; 
    margin: 20px auto;
    gap: 6px;
  }

  .key {
    width: 100px;
    height: 240px;
    margin: 2px;
    border: 4px solid #FFD700;
    border-radius: 20px;
    cursor: pointer;
    font-size: 24px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding-bottom: 12px;
    user-select: none;
    transition: transform 0.1s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .key:active { transform: scale(0.95); }
  .glow { box-shadow: 0 0 25px 10px yellow !important; }

  /* Sparkle effect */
  .key::after {
    content: "✨";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    font-size: 50px;
    opacity: 0;
    pointer-events: none;
    animation: sparkle 0.5s ease-out;
  }
  @keyframes sparkle {
    0% { opacity: 0; transform: scale(0.5) rotate(0deg); }
    50% { opacity: 1; transform: scale(1.2) rotate(45deg); }
    100% { opacity: 0; transform: scale(0.5) rotate(90deg); }
  }

  .C{background:#FF4C4C;} .D{background:#FF9933;} .E{background:#FFD700;} .F{background:#32CD32;}
  .G{background:#1E90FF;} .A{background:#8A2BE2;} .B{background:#FF69B4;} .C5{background:#FF4C4C;}

  .controls {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  button {
    padding: 12px 20px; 
    font-size: 18px; 
    border: none; 
    border-radius: 14px; 
    cursor: pointer;
    box-shadow: 3px 3px #333; 
    color: #fff;
  }
  .record{background:#e74c3c;} 
  .stop{background:#f39c12;} 
  .play{background:#2ecc71;} 
  .beatToggle{background:#3498db;}

  #instrumentIcon { 
    font-size: 70px; 
    margin: 15px; 
    text-shadow: 3px 3px #222; 
    transition: transform 0.3s;
  }
  #instrumentIcon.bounce { animation: bounce 0.5s; }
  @keyframes bounce { 0%{transform:scale(1);} 50%{transform:scale(1.3);} 100%{transform:scale(1);} }

  #message {
    font-size: 22px;
    color: #fff;
    margin-top: 10px;
    min-height: 30px;
  }
</style>
</head>
<body>

<h1>🎶 Pre-K Piano Deluxe 🎶</h1>
<p>Click the rainbow keys! Record and playback your tune.</p>

<select id="instrumentSelect">
  <option value="piano">🎹 Piano</option>
  <option value="xylophone">🔔 Xylophone</option>
  <option value="bells">🎶 Bells</option>
</select>

<div id="instrumentIcon">🎹</div>
<div class="piano" id="piano"></div>

<div class="controls">
  <button class="record" onclick="startRecording()">⏺️ Record</button>
  <button class="stop" onclick="stopRecording()">⏹️ Stop</button>
  <button class="play" onclick="playRecording()">▶️ Play</button>
  <button class="beatToggle" onclick="toggleBeat()">🥁 Beat</button>
</div>

<div id="message"></div>

<!-- Optional Beat -->
<audio id="beatAudio" src="https://actions.google.com/sounds/v1/drums/drum_loop.ogg" loop preload="auto"></audio>

<script>
const NOTES = ["C4","D4","E4","F4","G4","A4","B4","C5"];
const piano = document.getElementById("piano");
const instrumentIcon = document.getElementById("instrumentIcon");
const instrumentSelect = document.getElementById("instrumentSelect");
const message = document.getElementById("message");
let currentInstrument = "piano";

const instrumentIcons = { piano:"🎹", xylophone:"🔔", bells:"🎶" };

instrumentSelect.onchange = e => {
  currentInstrument = e.target.value;
  instrumentIcon.textContent = instrumentIcons[currentInstrument];
  instrumentIcon.classList.add("bounce");
  setTimeout(()=>instrumentIcon.classList.remove("bounce"),500);
};

const freqMap = {"C4":261.63,"D4":293.66,"E4":329.63,"F4":349.23,"G4":392.0,"A4":440.0,"B4":493.88,"C5":523.25};

let isRecording=false, recording=[], startTime=null;
let beatPlaying=false;
const beatAudio = document.getElementById("beatAudio");

function playNote(note, keyEl){
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  // Instrument sound type
  if(currentInstrument==="piano"){ osc.type="sine"; gain.gain.setValueAtTime(0.6, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+1); }
  if(currentInstrument==="xylophone"){ osc.type="triangle"; gain.gain.setValueAtTime(0.8, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.6); }
  if(currentInstrument==="bells"){ osc.type="square"; gain.gain.setValueAtTime(0.7, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+1.5); }

  osc.frequency.value=freqMap[note];
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime+2);

  if(isRecording) recording.push({note,time:Date.now()-startTime});
  if(keyEl){
    keyEl.classList.add("glow");
    keyEl.querySelector('::after'); // trigger sparkle
    setTimeout(()=>keyEl.classList.remove("glow"),300);
  }

  // Encouragement message
  const messages = ["🎵 Awesome!","🌟 Fantastic!","🎶 Keep going!","💖 Beautiful!"];
  message.textContent = messages[Math.floor(Math.random()*messages.length)];
}

NOTES.forEach(note => {
  const key = document.createElement("div");
  const label = note.replace(/[0-9]/g,"");
  key.className = "key " + label + (note==="C5"?" C5":"");
  key.innerText = label;
  key.dataset.note = note;
  key.onmousedown = () => playNote(note, key); // allow holding
  piano.appendChild(key);
});

// Recording functions
function startRecording(){ recording=[]; startTime=Date.now(); isRecording=true; message.textContent="🎤 Recording started!"; }
function stopRecording(){ isRecording=false; message.textContent="⏹️ Recording stopped."; }
function playRecording(){
  if(recording.length===0){ message.textContent="No recording yet!"; return;}
  message.textContent="▶️ Playing your recording!";
  recording.forEach(ev=>setTimeout(()=>{
    const key=document.querySelector(`[data-note="${ev.note}"]`);
    playNote(ev.note,key);
  },ev.time));
}

// Beat toggle
function toggleBeat(){
  beatPlaying = !beatPlaying;
  if(beatPlaying) { beatAudio.play().catch(()=>{}); message.textContent="🥁 Beat On!"; }
  else { beatAudio.pause(); beatAudio.currentTime=0; message.textContent="🥁 Beat Off!"; }
}
</script>
</body>
</html>
