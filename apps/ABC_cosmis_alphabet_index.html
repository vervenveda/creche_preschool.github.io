<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pre-K Cosmic Alphabet Quest™</title>

<!-- Custom Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Brandon+Grotesque:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: 'Brandon Grotesque', sans-serif;
    background: linear-gradient(135deg, #ffe6f0, #fffcdb);
    color: #333;
  }
  h1,h2,h3 { font-family: 'Cinzel', serif; }
  .container { max-width: 900px; margin: 0 auto; padding: 20px; }
  .planet-selector { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .planet-btn { flex: 1; padding: 10px; background: #FFD6E8; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; text-align: center; }
  .planet-btn.active { background: #ED3B91; color: #fff; }
  .section { display: none; }
  .section.active { display: block; }
  .canvas-container { border: 3px dashed #ff7f50; border-radius: 12px; padding: 10px; margin-bottom: 10px; position: relative; }
  canvas { background: #fff9e6; border-radius: 8px; width: 100%; height: 200px; touch-action: none; }
  .letters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .letter-tile { background: #ffd700; border-radius: 8px; padding: 10px 15px; font-weight: bold; cursor: grab; user-select: none; }
  .drop-zone { background: #fff9e6; border: 2px dashed #ff7f50; border-radius: 8px; padding: 10px; min-height: 50px; display: flex; gap: 5px; flex-wrap: wrap; }
  .word-list { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .word-card { background: #ffefc3; padding: 10px 15px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
  .word-card:hover { background: #ffd700; color: #fff; }
  .reward { position: absolute; width: 20px; height: 20px; border-radius: 50%; pointer-events: none; }
  .sparkle { animation: sparkleAnim 1s forwards; }
  @keyframes sparkleAnim { 0%{transform:scale(0);opacity:1;}50%{transform:scale(1.5);opacity:1;}100%{transform:scale(0);opacity:0;} }
</style>
</head>
<body>
<div class="container">
  <h1>💫 Cosmic Alphabet Quest™ - Pre-K</h1>
  <div class="planet-selector">
    <button class="planet-btn active" data-target="tracing">Planet A: Trace Letters</button>
    <button class="planet-btn" data-target="matching">Planet B: Match Words</button>
    <button class="planet-btn" data-target="spelling">Planet C: Spell Words</button>
    <button class="planet-btn" data-target="traceWord">Planet D: Trace a Word</button>
    <button class="planet-btn" data-target="findObject">Planet E: Find the Object</button>
  </div>

  <!-- Planet Sections -->
  <div id="tracing" class="section active">
    <h2>Trace Letters</h2>
    <div class="canvas-container">
      <canvas id="traceCanvas"></canvas>
    </div>
    <p>Trace the letter shown below:</p>
    <h3 id="currentLetter" style="font-size:48px;text-align:center;">A</h3>
    <button id="nextLetterBtn">Next Letter</button>
  </div>

  <div id="matching" class="section">
    <h2>Match Words to Pictures</h2>
    <div id="matchingArea"></div>
  </div>

  <div id="spelling" class="section">
    <h2>Spell Words</h2>
    <p>Drag the letters to the box to spell the word:</p>
    <div class="letters" id="letterTiles"></div>
    <div class="drop-zone" id="spellingDrop"></div>
    <button id="checkSpellingBtn">Check</button>
  </div>

  <div id="traceWord" class="section">
    <h2>Trace the Word</h2>
    <div class="canvas-container">
      <canvas id="traceWordCanvas"></canvas>
    </div>
    <p id="wordToTrace" style="font-size:32px;text-align:center;">at</p>
    <button id="nextWordTraceBtn">Next Word</button>
  </div>

  <div id="findObject" class="section">
    <h2>Find the Object</h2>
    <div id="findObjectArea"></div>
  </div>
</div>

<script>
const wordData = {
  "weeks":[
    {"week":1,"words":["an","at","is","up","on"]},
    {"week":2,"words":["in","it","by","me","no"]},
    {"week":3,"words":["do","go","we","he","as"]},
    {"week":4,"words":["be","if","my","so","or"]},
    {"week":5,"words":["am","us","to","at","an"]},
    {"week":6,"words":["on","in","it","is","up"]},
    {"week":7,"words":["he","me","my","no","do"]},
    {"week":8,"words":["go","we","be","if","as"]},
    {"week":9,"words":["or","am","us","at","an"]},
    {"week":10,"words":["in","it","on","is","up"]},
    {"week":11,"words":["he","me","my","do","go"]},
    {"week":12,"words":["we","be","if","as","or"]},
    {"week":13,"words":["am","us","to","at","an"]},
    {"week":14,"words":["on","in","it","is","up"]},
    {"week":15,"words":["he","me","my","no","do"]},
    {"week":16,"words":["go","we","be","if","as"]},
    {"week":17,"words":["or","am","us","at","an"]},
    {"week":18,"words":["in","it","on","is","up"]},
    {"week":19,"words":["he","me","my","do","go"]},
    {"week":20,"words":["we","be","if","as","or"]},
    {"week":21,"words":["am","us","to","at","an"]},
    {"week":22,"words":["on","in","it","is","up"]},
    {"week":23,"words":["he","me","my","no","do"]},
    {"week":24,"words":["go","we","be","if","as"]},
    {"week":25,"words":["or","am","us","at","an"]},
    {"week":26,"words":["in","it","on","is","up"]},
    {"week":27,"words":["he","me","my","do","go"]},
    {"week":28,"words":["we","be","if","as","or"]},
    {"week":29,"words":["am","us","to","at","an"]},
    {"week":30,"words":["on","in","it","is","up"]},
    {"week":31,"words":["he","me","my","no","do"]},
    {"week":32,"words":["go","we","be","if","as"]},
    {"week":33,"words":["or","am","us","at","an"]},
    {"week":34,"words":["in","it","on","is","up"]},
    {"week":35,"words":["he","me","my","do","go"]},
    {"week":36,"words":["we","be","if","as","or"]},
    {"week":37,"words":["am","us","to","at","an"]},
    {"week":38,"words":["on","in","it","is","up"]},
    {"week":39,"words":["he","me","my","no","do"]},
    {"week":40,"words":["go","we","be","if","as"]},
    {"week":41,"words":["or","am","us","at","an"]},
    {"week":42,"words":["in","it","on","is","up"]}
  ]
};

// --- Planet Navigation ---
const planetBtns = document.querySelectorAll(".planet-btn");
const sections = document.querySelectorAll(".section");
planetBtns.forEach(btn => {
  btn.addEventListener("click", () => {
    planetBtns.forEach(b=>b.classList.remove("active"));
    sections.forEach(s=>s.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(btn.dataset.target).classList.add("active");
  });
});

// --- Letter Tracing ---
const traceCanvas = document.getElementById("traceCanvas");
const ctx = traceCanvas.getContext("2d");
let currentLetterIndex = 0;
let letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
traceCanvas.width = traceCanvas.offsetWidth;
traceCanvas.height = traceCanvas.offsetHeight;
let drawing = false;
traceCanvas.addEventListener("pointerdown",()=>drawing=true);
traceCanvas.addEventListener("pointerup",()=>drawing=false);
traceCanvas.addEventListener("pointermove",(e)=>{
  if(drawing){
    const rect = traceCanvas.getBoundingClientRect();
    ctx.fillStyle="#ff7f50";
    ctx.beginPath();
    ctx.arc(e.clientX-rect.left,e.clientY-rect.top,8,0,Math.PI*2);
    ctx.fill();
  }
});
function loadNextLetter(){
  ctx.clearRect(0,0,traceCanvas.width,traceCanvas.height);
  currentLetterIndex = (currentLetterIndex+1)%letters.length;
  document.getElementById("currentLetter").textContent = letters[currentLetterIndex];
}
document.getElementById("nextLetterBtn").addEventListener("click",loadNextLetter);

// --- Spelling Drag & Drop ---
const spellingTiles = document.getElementById("letterTiles");
const spellingDrop = document.getElementById("spellingDrop");
let currentSpellingWord = wordData.weeks[0].words[0];
function loadSpellingWord(){
  spellingDrop.innerHTML="";
  spellingTiles.innerHTML="";
  currentSpellingWord = wordData.weeks[0].words[Math.floor(Math.random()*5)];
  const lettersArr = currentSpellingWord.split("").sort(()=>Math.random()-0.5);
  lettersArr.forEach(l=>{
    const tile = document.createElement("div");
    tile.className="letter-tile";
    tile.textContent=l;
    tile.draggable=true;
    tile.addEventListener("dragstart",e=>e.dataTransfer.setData("text",l));
    spellingTiles.appendChild(tile);
  });
}
spellingDrop.addEventListener("dragover",e=>e.preventDefault());
spellingDrop.addEventListener("drop",e=>{
  const letter = e.dataTransfer.getData("text");
  const div = document.createElement("div");
  div.className="letter-tile";
  div.textContent=letter;
  spellingDrop.appendChild(div);
});
document.getElementById("checkSpellingBtn").addEventListener("click",()=>{
  const userWord = Array.from(spellingDrop.children).map(d=>d.textContent).join("");
  if(userWord===currentSpellingWord){
    alert("🎉 Correct!"); loadSpellingWord();
  } else alert("Try again!");
});
loadSpellingWord();

// --- Trace Word ---
const traceWordCanvas = document.getElementById("traceWordCanvas");
const twCtx = traceWordCanvas.getContext("2d");
traceWordCanvas.width = traceWordCanvas.offsetWidth;
traceWordCanvas.height = traceWordCanvas.offsetHeight;
let drawingWord = false;
traceWordCanvas.addEventListener("pointerdown",()=>drawingWord=true);
traceWordCanvas.addEventListener("pointerup",()=>drawingWord=false);
traceWordCanvas.addEventListener("pointermove",(e)=>{
  if(drawingWord){
    const rect = traceWordCanvas.getBoundingClientRect();
    twCtx.fillStyle="#ff7f50";
    twCtx.beginPath();
    twCtx.arc(e.clientX-rect.left,e.clientY-rect.top,8,0,Math.PI*2);
    twCtx.fill();
  }
});
let currentTraceWordIndex = 0;
function loadNextTraceWord(){
  twCtx.clearRect(0,0,traceWordCanvas.width,traceWordCanvas.height);
  const wordObj = wordData.weeks[0].words;
  currentTraceWordIndex = (currentTraceWordIndex+1)%wordObj.length;
  document.getElementById("wordToTrace").textContent = wordObj[currentTraceWordIndex];
}
document.getElementById("nextWordTraceBtn").addEventListener("click",loadNextTraceWord);
loadNextTraceWord();

// --- Matching Game ---
const matchingArea = document.getElementById("matchingArea");
const sampleMatching = [
  {word:"an",img:"🍎"},
  {word:"at",img:"🏠"},
  {word:"is",img:"🐱"},
  {word:"up",img:"☁️"},
  {word:"on",img:"🌳"}
];
function loadMatching(){
  matchingArea.innerHTML="";
  sampleMatching.forEach(item=>{
    const wordDiv = document.createElement("div");
    wordDiv.textContent=item.word;
    wordDiv.className="word-card";
    wordDiv.addEventListener("click",()=>alert("🎉 You found it!"));
    matchingArea.appendChild(wordDiv);
  });
}
loadMatching();

// --- Find the Object ---
const findObjectArea = document.getElementById("findObjectArea");
const sampleObjects = [
  {word:"an",img:"🍎"},
  {word:"at",img:"🏠"},
  {word:"is",img:"🐱"},
  {word:"up",img:"☁️"},
  {word:"on",img:"🌳"}
];
function loadFindObject(){
  findObjectArea.innerHTML="";
  sampleObjects.forEach(obj=>{
    const btn = document.createElement("button");
    btn.textContent=obj.img;
    btn.style.fontSize="40px";
    btn.addEventListener("click",()=>alert("⭐ You found it!"));
    findObjectArea.appendChild(btn);
  });
}
loadFindObject();

</script>
</body>
</html>
