<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>🌕 Sunny’s Moon Adventure</title>
<style>
  html,body{
    margin:0;height:100%;overflow:hidden;
    font-family:"Comic Sans MS","Poppins",sans-serif;
    background:linear-gradient(180deg,#1702A3 0%,#f0e5ff 60%,#2a1f55 100%);
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    color:#fff;text-align:center;
  }
  #sky{
    position:absolute;top:0;left:0;width:100%;height:100%;
    background:radial-gradient(circle at 50% 20%,#fffbe7 0%,transparent 60%);
    z-index:0;
  }
  #moon{
    width:200px;height:200px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#ffffff 40%,#dddddd 60%,#aaa 100%);
    box-shadow:0 0 40px 10px rgba(255,255,230,0.6);
    margin-bottom:40px;
    position:relative;
    overflow:hidden;
    transition:background 1s,box-shadow 1s;
  }
  #shadow{
    position:absolute;top:0;left:0;width:100%;height:100%;
    border-radius:50%;
    background:radial-gradient(circle at 70% 30%,rgba(0,0,0,0.8) 0%,rgba(0,0,0,0.9) 60%,rgba(0,0,0,1) 100%);
    transform:translateX(0);
    transition:transform 1s;
  }
  h1{margin:10px 0;font-size:2.2em;text-shadow:2px 2px #000;}
  #desc{font-size:1.4em;margin-bottom:25px;text-shadow:1px 1px #000;}
  .controls{display:flex;gap:20px;z-index:2;}
  button{
    background:#ffd54f;
    border:none;border-radius:20px;
    padding:16px 26px;
    font-size:1.3em;font-weight:bold;
    color:#4a2c00;
    box-shadow:0 6px 0 #c69c2f;
    cursor:pointer;
    transition:transform .2s,box-shadow .2s;
  }
  button:active{transform:translateY(4px);box-shadow:0 2px 0 #c69c2f;}
  #stars canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>
<body>
<div id="sky"></div>
<div id="stars"><canvas></canvas></div>

<div id="moon"><div id="shadow"></div></div>
<h1 id="phaseTitle">Full Moon</h1>
<div id="desc">The moon is big and bright tonight!</div>

<div class="controls">
  <button id="prevBtn">⬅️ Back</button>
  <button id="nextBtn">Next ➡️</button>
</div>

<script>
/* === Star twinkle background === */
const starCanvas=document.querySelector("#stars canvas");
const sctx=starCanvas.getContext("2d");
function resizeStars(){
  starCanvas.width=window.innerWidth;
  starCanvas.height=window.innerHeight;
}
window.addEventListener("resize",resizeStars);resizeStars();
const stars=Array.from({length:100},()=>({
  x:Math.random()*starCanvas.width,
  y:Math.random()*starCanvas.height,
  r:Math.random()*1.8+0.5,
  a:Math.random()*Math.PI*2
}));
function drawStars(){
  sctx.clearRect(0,0,starCanvas.width,starCanvas.height);
  stars.forEach(s=>{
    s.a+=0.02;
    sctx.globalAlpha=0.5+0.5*Math.sin(s.a);
    sctx.beginPath();
    sctx.arc(s.x,s.y,s.r,0,2*Math.PI);
    sctx.fillStyle="#fff";
    sctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

/* === Moon phase sequence === */
const phases=[
  {name:"New Moon",msg:"The moon is hiding. We can’t see it!",pos:"0%"},
  {name:"Waxing Crescent",msg:"A tiny sliver of moonlight appears!",pos:"20%"},
  {name:"First Quarter",msg:"Half the moon is bright tonight!",pos:"50%"},
  {name:"Waxing Gibbous",msg:"Almost full — it’s getting brighter!",pos:"80%"},
  {name:"Full Moon",msg:"The moon is big and bright!",pos:"100%"},
  {name:"Waning Gibbous",msg:"It’s starting to shrink again!",pos:"80%"},
  {name:"Last Quarter",msg:"Half the moon shows once more.",pos:"50%"},
  {name:"Waning Crescent",msg:"Just a little smile of moonlight!",pos:"20%"}
];
let index=4; // start at full moon
const moon=document.getElementById("moon");
const shadow=document.getElementById("shadow");
const title=document.getElementById("phaseTitle");
const desc=document.getElementById("desc");
function showPhase(i){
  const p=phases[i];
  title.textContent=p.name;
  desc.textContent=p.msg;
  // move shadow to simulate lighting
  if(i<=4){ // waxing to full
    shadow.style.transform=`translateX(${100-parseInt(p.pos)}%)`;
  }else{ // waning
    shadow.style.transform=`translateX(${-parseInt(p.pos)}%)`;
  }
  // glow changes
  const glowStrength=i===4?1:0.5;
  moon.style.boxShadow=`0 0 50px ${glowStrength*20}px rgba(255,255,220,0.8)`;
}
document.getElementById("nextBtn").onclick=()=>{
  index=(index+1)%phases.length;showPhase(index);
};
document.getElementById("prevBtn").onclick=()=>{
  index=(index-1+phases.length)%phases.length;showPhase(index);
};
showPhase(index);
</script>
</body>
</html>
