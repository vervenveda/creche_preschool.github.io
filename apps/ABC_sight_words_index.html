<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pre K Sight Words - Spelling Soup!</title>
<style>
:root{
  --red:#ff3b30; --yellow:#ffd100; --blue:#007aff; --green:#34c759;
  --white:#ffffff; --bg:#fff7e0;
}
html,body{
  margin:0; height:100%;
  font-family:"Comic Sans MS","Poppins",sans-serif;
  background: linear-gradient(180deg,#ffd700 0%,#ffafaf 50%,#63c2ff 100%);
  display:flex; justify-content:center; align-items:center;
}
.app {
  width:100%; max-width:460px; background:var(--bg); border-radius:20px; padding:15px 12px 25px;
  box-shadow:0 12px 44px #0002; text-align:center; position:relative;
}
h1{margin:4px 0 5px; font-size:2.2rem; color:var(--blue);}
#subtitle{color:#555;font-size:1rem;margin-bottom:6px;}
.word-img{font-size:3rem;margin:8px 0 5px;}
#boppi{
  font-size:3rem; position:absolute; top:-40px; right:20px;
  transition: transform 0.3s;
}
#score{font-size:1.2rem; margin-bottom:6px; font-weight:bold; color:#444;}
.progress-bar{height:10px; width:85%; margin:7px auto 9px; background:#ffd10033; border-radius:8px; overflow:hidden;}
.progress-bar-inner{height:100%; background:#ffd100; border-radius:8px; transition:width .6s;}
.soup-area{
  margin:0 auto 12px; width:300px; height:130px; background:#fff3d2;
  border-radius:35px 35px 120px 120px/35px 35px 90px 90px;
  border:7px solid #fff; box-shadow:0 5px 16px #ffb86054, 0 1px 0 #fff;
  display:flex; align-items:center; justify-content:center; position:relative;
}
#dropzone{width:90%; min-height:54px; min-width:140px; display:flex; justify-content:center;}
.drop-tile{
  display:inline-block; background:#ffe066; color:#333;
  font-size:2.2rem; font-weight:800; margin:0 4px; padding:8px 0 4px;
  width:50px; height:50px; border-radius:12px; border:2.5px solid #e6c144;
  box-shadow:0 3px 8px #ffdb0090; transition: background .2s, border .2s; text-align:center;
  user-select:none;
}
.drop-tile.empty{background:#fff6c1;color:#bbb;border-style:dashed;}
.drop-tile.wrong{background:#ffd2d2;border-color:#ff7d7d;}
.drop-tile.right{background:#c1ffda;border-color:#36cc8a;}
.letters{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin:14px 0;}
.letter-tile{
  background:linear-gradient(135deg,var(--blue) 50%,var(--yellow) 100%);
  color:#fff; font-size:2rem; font-weight:700; width:55px; height:55px;
  border-radius:14px; box-shadow:0 3px 10px #a9dfff64;
  display:flex; align-items:center; justify-content:center;
  cursor:grab; user-select:none; border:2.3px solid #b1cdf0;
  transition:background .14s,box-shadow .13s, transform .2s;
}
.letter-tile:active{background:var(--red); transform: scale(1.1);}
.letter-tile.disabled{opacity:0.5; pointer-events:none;}
#message{font-size:1.2rem; font-weight:bold; color:#444; margin:7px 0 6px; min-height:30px;}
.controls{margin-top:8px;}
.btn{
  background:var(--blue); color:var(--white); border:none; padding:10px 20px; border-radius:12px;
  font-size:1.15rem; cursor:pointer; box-shadow:0 5px 10px #a9dfff34; margin:0 5px;
}
.btn.secondary{background:var(--yellow); color:#222;}
.confetti{
  position:fixed; width:10px; height:10px; border-radius:50%; pointer-events:none; opacity:0.93;
  animation:confetti-fall 900ms cubic-bezier(.2,.8,.2,1) forwards;
}
@keyframes confetti-fall{
  0%{ transform:translate(-50%,-50%) scale(1); opacity:1;}
  100%{ transform:translate(-50%,-120%) scale(.6); opacity:0;}
}
#quizOverlay{
  position:fixed; top:0; left:0; width:100%; height:100%; background:#000000aa;
  display:flex; justify-content:center; align-items:center; visibility:hidden; opacity:0;
  transition:opacity .3s;
}
#quizBox{
  background:#fff; border-radius:20px; padding:20px 15px; width:90%; max-width:350px; text-align:center;
  box-shadow:0 8px 20px #0004;
}
.quiz-question{font-size:1.2rem; margin-bottom:12px;}
.quiz-options{display:flex; flex-wrap:wrap; gap:12px; justify-content:center;}
.quiz-options button{
  flex:1 1 40%; padding:10px; font-size:1rem; border-radius:12px; border:none; cursor:pointer;
  background:linear-gradient(135deg,var(--yellow),var(--green)); color:#222; font-weight:bold;
  transition: transform .15s, background .2s;
}
.quiz-options button:hover{transform:scale(1.05); background:linear-gradient(135deg,var(--green),var(--yellow));}
</style>
</head>

      {q:"Which circle is yellow?", options:["🟡","🔵","🔴"], correct:0}
  ]},
  { word:"you", img:"👧", prompt:"You are special!", quiz:[
      {q:"Which word means the person you are talking to?", options:["you","me","they"], correct:0},
      {q:"Which emoji shows a child?", options:["👧","👦","👶"], correct:0}
  ]}
  ]},
  { word:"to", img:"➡️", prompt:"Move to there.", quiz:[
      {q:"Which word shows direction?", options:["to","from","on"], correct:0},
      {q:"Which arrow shows movement?", options:["➡️","⬅️","↕️"], correct:0}
  ]}
];

let idx = 0, userLetters = [], soundOn = true, score = 0;
const dropzone = document.getElementById('dropzone');
const lettersArea = document.getElementById('lettersArea');
const message = document.getElementById('message');
const wordImg = document.getElementById('wordImg');
const progressBar = document.getElementById('progress');
const boppi = document.getElementById('boppi');
const scoreDisplay = document.getElementById('score');
const quizOverlay = document.getElementById('quizOverlay');
const quizQuestion = document.getElementById('quizQuestion');
const quizOptions = document.getElementById('quizOptions');

function speak(text){
  if(!soundOn) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.96; u.pitch = 1.11;
  const v = speechSynthesis.getVoices().find(v=>v.name.match(/child|female|Samantha|Google US/i))||speechSynthesis.getVoices()[0];
  if(v) u.voice = v; speechSynthesis.cancel(); speechSynthesis.speak(u);
}

// Shuffle helper
function shuffle(arr){let a=arr.slice(); for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;}

// ===== Render Word =====
function renderWord(){
  let {word,img,prompt} = WORDS[idx];
  userLetters = Array(word.length).fill("");
  wordImg.innerHTML = img;
  dropzone.innerHTML='';
  progressBar.style.width = `${(idx/WORDS.length)*100}%`;

  // Drop tiles
  for(let i=0;i<word.length;i++){
    const tile = document.createElement('div');
    tile.className='drop-tile empty'; tile.dataset.pos=i;
    tile.setAttribute('aria-label','Blank letter slot');
    dropzone.appendChild(tile);
  }

  // Letter tiles
  const shuffled = shuffle(word.toUpperCase().split(''));
  lettersArea.innerHTML='';
  shuffled.forEach((l,n)=>{
    const tile = document.createElement('div');
    tile.className='letter-tile'; tile.textContent=l;
    tile.setAttribute('draggable','true'); tile.setAttribute('aria-label','Letter '+l);
    tile.addEventListener('dragstart',ev=>{ ev.dataTransfer.setData('text/plain',l+"|"+n); setTimeout(()=>tile.classList.add('disabled'),0); });
    tile.addEventListener('dragend',()=>tile.classList.remove('disabled'));
    tile.addEventListener('click',()=>placeLetter(l,n));
    tile.addEventListener('dblclick',()=>speak(l));
    lettersArea.appendChild(tile);
  });

  message.textContent=prompt;
  speak("Let's spell. "+prompt);
}

// ===== Place Letter =====
function placeLetter(ltr,tileIdx){
  let empty=[...dropzone.children].findIndex(d=>d.classList.contains('empty'));
  if(empty<0) return;
  let {word} = WORDS[idx];
  let correct = ltr.toLowerCase() === word[empty];

  if(correct){
    dropzone.children[empty].textContent=ltr;
    dropzone.children[empty].className='drop-tile right';
    userLetters[empty]=ltr;
    [...lettersArea.children][tileIdx].classList.add('disabled');
    spawnBoppi('jump');
    score += 5;
    scoreDisplay.textContent="Score: "+score+" ⭐";

    if(userLetters.join('').toLowerCase()===word){
      message.textContent="Great job! You spelled "+word.toUpperCase()+"!";
      speak("Great job! You spelled "+word+"!");
      spawnConfetti();
      setTimeout(showQuiz,800);
    }
  } else {
    dropzone.children[empty].classList.add('wrong');
    message.textContent="Try again!";
    speak("Try again!");
    spawnBoppi('shake');
    setTimeout(()=>dropzone.children[empty].classList.remove('wrong'),700);
  }
}

// Drag & Drop
dropzone.addEventListener('dragover',e=>e.preventDefault());
dropzone.addEventListener('drop',e=>{
  e.preventDefault();
  const data = e.dataTransfer.getData('text/plain');
  if(!data) return;
  const [ltr,tileIdx]=data.split('|');
  placeLetter(ltr, Number(tileIdx));
});

// ===== Reset / Start Over =====
document.getElementById('resetBtn').onclick = ()=>{
  idx=0; score=0;
  scoreDisplay.textContent="Score: 0 ⭐";
  renderWord();
  progressBar.style.width="0%";
  message.textContent="Ready? Let's spell!";
  speak("Let's play Spelling Soup!");
};
document.getElementById('volumeBtn').onclick=()=>{
  soundOn=!soundOn;
  document.getElementById('volumeBtn').textContent = soundOn ? "🔊":"🔈";
};

// ===== Next Word =====
function nextWord(){
  idx++;
  if(idx >= WORDS.length){
    progressBar.style.width="100%";
    message.textContent="Yay! You finished all words! 🎉";
    speak("Yay! You finished all the words!");
    setTimeout(()=>{ idx=0; renderWord(); message.textContent="Ready for more?"; speak("Let's play again!"); },2500);
    return;
  }
  renderWord();
}

// ===== Confetti =====
function spawnConfetti(){
  const colors=['#ff3b30','#ffd100','#007aff','#34c759','#ff69b4','#ff8c00'];
  for(let i=0;i<14;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    const app=document.querySelector('.app').getBoundingClientRect();
    const sx=app.left+app.width/2+(Math.random()-0.5)*(app.width*0.7);
    const sy=app.top+app.height/2+(Math.random()-0.5)*(app.height*0.2);
    c.style.left=sx+'px'; c.style.top=sy+'px';
    const s=6+Math.random()*10; c.style.width=s+'px'; c.style.height=s+'px';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1000);
  }
}

// ===== Boppi Animations =====
function spawnBoppi(action){
  if(action==='jump'){
    boppi.style.transform='translateY(-25px)'; 
    setTimeout(()=>boppi.style.transform='translateY(0px)',300);
  } else if(action==='shake'){
    boppi.style.transform='rotate(-15deg)';
    setTimeout(()=>boppi.style.transform='rotate(15deg)',100);
    setTimeout(()=>boppi.style.transform='rotate(0deg)',200);
  }
}

// ===== Quiz =====
function showQuiz(){
  const qlist=WORDS[idx].quiz;
  if(!qlist || qlist.length===0){ nextWord(); return; }
  const q = qlist[0]; // pick first quiz for simplicity
  quizQuestion.textContent=q.q;
  quizOptions.innerHTML='';
  q.options.forEach((opt,i)=>{
    const btn=document.createElement('button'); btn.textContent=opt;
    btn.onclick=()=>{
      if(i===q.correct){ score+=5; spawnBoppi('jump'); speak("Correct!"); message.textContent="Correct! +5 points"; }
      else { spawnBoppi('shake'); speak("Oops! Try next time."); message.textContent="Oops!"; }
      scoreDisplay.textContent="Score: "+score+" ⭐";
      quizOverlay.style.opacity=0; setTimeout(()=>{ quizOverlay.style.visibility='hidden'; nextWord(); },300);
    };
    quizOptions.appendChild(btn);
  });
  quizOverlay.style.visibility='visible'; quizOverlay.style.opacity=1;
}

// ===== Start =====
renderWord();
</script>
</body>
</html>
